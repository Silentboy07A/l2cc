name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/l2c-app:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/l2c-app:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name l2c-app \
            --resource-group l2c-resource-group \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/l2c-app:${{ github.sha }} \
            --set-env-vars \
              MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              CLIENT_URL="${{ secrets.CLIENT_URL }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              GOOGLE_CALLBACK_URL="${{ secrets.GOOGLE_CALLBACK_URL }}" \
              TWILIO_SID="${{ secrets.TWILIO_SID }}" \
              TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
              TWILIO_PHONE="${{ secrets.TWILIO_PHONE }}"
