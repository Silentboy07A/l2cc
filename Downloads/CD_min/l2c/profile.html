<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Profile | L2C</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #ef4f5f;
            --primary-dark: #d43f4f;
            --primary-light: #ffedef;
            --dark: #293142;
            --gray: #62626a;
            --border: #e6e9ef;
            --light-gray: #f4f4f5;
            --white: #ffffff;
            --green: #1ba672;
            --font: 'Lexend', sans-serif;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 20px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--light-gray);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            font-family: var(--font);
            border: none;
            outline: none;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: .8px solid var(--border);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray);
            transition: color .2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        /* Page Layout */
        .page-header {
            background: white;
            border-bottom: .8px solid var(--border);
            padding: 24px 40px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
        }

        .page-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: var(--r-lg);
            border: .8px solid var(--border);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            padding: 32px;
            gap: 32px;
            align-items: flex-start;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 4px solid white;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--r-md);
            border: 1.5px solid var(--border);
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .btn-save {
            padding: 12px 32px;
            border-radius: 99px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 15px;
            margin-top: 10px;
            transition: all .2s;
        }

        .btn-save:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        /* Address Section */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .address-card {
            background: white;
            border-radius: var(--r-md);
            border: .8px solid var(--border);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .addr-icon {
            font-size: 20px;
        }

        .addr-info h4 {
            font-size: 14px;
            font-weight: 700;
        }

        .addr-info p {
            font-size: 13px;
            color: var(--gray);
        }

        @media (max-width: 600px) {
            .profile-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 24px;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
    <script src="common.js"></script>
    <script>L2C.requireAuth();</script>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">🍽️</div>
            <div class="logo-text">L<span>2</span>C</div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="favorites.html">Favorites</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="tracking.html">Track Order</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="profile.html" class="active">Profile</a></li>
        </ul>
        <div class="navbar-actions">
            <button class="btn-primary" onclick="window.location.href='login.html'">Sign In</button>
        </div>
    </nav>

    <div class="page-header">
        <div class="page-title">My Profile 👤</div>
    </div>

    <div class="page-wrap">
        <div class="profile-card">
            <div class="profile-avatar">👤</div>
            <div class="profile-info">
                <input type="text" class="form-input profile-name" id="user-name" value="Guest User"
                    style="border:none; padding:0; margin-bottom:4px; width:auto; font-size:24px; font-weight:700;">
                <div class="profile-email">guest@lazy2cook.com</div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-input" value="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label class="form-label">Default Address</label>
                    <input type="text" class="form-input" value="Koramangala 4th Block, Bangalore">
                </div>
                <button class="btn-save" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <div class="section-title">📍 Saved Addresses</div>
            <div class="address-card">
                <div class="addr-icon">🏠</div>
                <div class="addr-info">
                    <h4>Home</h4>
                    <p>Koramangala 4th Block, Bangalore, 560034</p>
                </div>
            </div>
            <div class="address-card">
                <div class="addr-icon">💼</div>
                <div class="addr-info">
                    <h4>Work</h4>
                    <p>Prestige Tech Park, Outer Ring Road, Bangalore</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function saveProfile() {
            const nameInput = document.getElementById('user-name').value;
            const user = L2C.getLoggedInUser();
            if (user) {
                const names = nameInput.trim().split(' ');
                user.firstName = names[0] || '';
                user.lastName = names.slice(1).join(' ') || '';
                L2C.setLoggedInUser(user);

                // Also update in users list
                const users = L2C.getUsers();
                const idx = users.findIndex(u => u.email === user.email);
                if (idx > -1) {
                    users[idx] = user;
                    L2C.saveUsers(users);
                }

                L2C.updateNavbar();
                alert('Profile saved!');
            }
        }

        // Load data
        const user = L2C.getLoggedInUser();
        if (user) {
            document.getElementById('user-name').value = `${user.firstName} ${user.lastName}`.trim();
            document.querySelector('.profile-email').textContent = user.email;
            document.querySelectorAll('.form-input')[1].value = user.phone || '';
        }
    </script>
</body>

</html>
