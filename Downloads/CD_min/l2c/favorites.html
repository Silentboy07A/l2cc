<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Favorites | L2C</title>
    <script src="common.js"></script>
    <script>L2C.requireAuth();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #ef4f5f;
            --primary-dark: #d43f4f;
            --primary-light: #ffedef;
            --dark: #293142;
            --gray: #62626a;
            --border: #e6e9ef;
            --light-gray: #f4f4f5;
            --white: #ffffff;
            --green: #1ba672;
            --font: 'Lexend', sans-serif;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 20px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--light-gray);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            font-family: var(--font);
            border: none;
            outline: none;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: .8px solid var(--border);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray);
            transition: color .2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        /* Page Layout */
        .page-header {
            background: white;
            border-bottom: .8px solid var(--border);
            padding: 24px 40px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
        }

        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        /* Rest Grid (Reused from restaurants.html) */
        .rest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }

        .rest-card {
            background: var(--white);
            border-radius: var(--r-lg);
            overflow: hidden;
            border: .8px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .rest-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .card-img-wrap {
            height: 180px;
            position: relative;
            cursor: pointer;
        }

        .card-img-bg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }

        .card-favorite {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
        }

        .card-body {
            padding: 16px 20px;
            cursor: pointer;
        }

        .card-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-cuisine {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 16px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            border-top: .8px solid var(--border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-val {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
        }

        .meta-val.green {
            color: var(--green);
        }

        .meta-key {
            font-size: 11px;
            font-weight: 500;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: .3;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
            }

            .nav-links {
                display: none;
            }

            .page-header,
            .page-wrap {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">🍜</div>
            <div class="logo-text">L<span>2</span>C</div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="favorites.html" class="active">Favorites</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="navbar-actions">
            <button class="btn-primary" onclick="window.location.href='login.html'">Sign In</button>
        </div>
    </nav>

    <div class="page-header">
        <div class="page-title">Your Favorites ❤️</div>
    </div>

    <div class="page-wrap">
        <div id="fav-grid" class="rest-grid"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="empty-icon">💔</div>
            <h3>No favorites yet!</h3>
            <p>Go to restaurants and tap the heart on your favorites.</p>
            <a href="restaurants.html"
                style="display:inline-block; margin-top:20px; color:var(--primary); font-weight:700;">Browse Restaurants
                →</a>
        </div>
    </div>

    <script>
        function renderFavorites() {
            const grid = document.getElementById('fav-grid');
            const empty = document.getElementById('empty-state');
            const favIds = L2C.getFavorites();
            const restaurants = L2C.restaurants.filter(r => favIds.includes(r.id));

            if (restaurants.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            empty.style.display = 'none';
            grid.innerHTML = restaurants.map(r => `
                <div class="rest-card" id="card-${r.id}">
                    <div class="card-img-wrap" onclick="viewRestaurant(${r.id})">
                        <div class="card-img-bg" style="background:${r.bg}">${r.emoji}</div>
                    </div>
                    <div class="card-favorite" onclick="toggleFav(${r.id})">❤️</div>
                    <div class="card-body" onclick="viewRestaurant(${r.id})">
                        <div class="card-name">${r.name}</div>
                        <div class="card-cuisine">${r.cuisine}</div>
                        <div class="card-meta">
                            <div class="meta-item">
                                <div class="meta-val green">★ ${r.rating}</div>
                                <div class="meta-key">Rating</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-val">${r.time} min</div>
                                <div class="meta-key">Delivery</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleFav(id) {
            L2C.toggleFavorite(id);
            renderFavorites();
            L2C.showToast('Removed from favorites');
        }

        function viewRestaurant(id) {
            const r = L2C.restaurants.find(x => x.id === id);
            window.location.href = `restaurant.html?id=${r.id}&name=${encodeURIComponent(r.name)}&cuisine=${encodeURIComponent(r.cuisine)}`;
        }

        renderFavorites();
    </script>
</body>

</html>
